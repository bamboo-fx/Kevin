<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books</title>
    <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
    <main>
        <header>
            <h1><a href="/" style="color: inherit; text-decoration: none;"></a></h1>
        </header>

        <section class="books-section">
            <div class="books-grid">
                <div class="book-card">
                    <img src="/relentless.png" alt="Relentless by Tim S. Grover" class="book-cover">
                    <h3 class="book-title">Relentless</h3>
                    <p class="book-author">Tim S. Grover</p>
                    <div class="book-rating">
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star">★</span>
                    </div>
                </div>

                <div class="book-card">
                    <img src="/winning.png" alt="W1nning by Tim S. Grover" class="book-cover">
                    <h3 class="book-title">W1nning</h3>
                    <p class="book-author">Tim S. Grover</p>
                    <div class="book-rating">
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star">★</span>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
